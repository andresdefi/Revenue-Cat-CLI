version: 2

builds:
  - main: .
    binary: rc
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/andresdefi/rc/internal/version.Version={{.Version}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: andresdefi
      name: homebrew-tap
    homepage: "https://github.com/andresdefi/rc"
    description: "Unofficial CLI for the RevenueCat REST API v2"
    license: "MIT"
    install: |
      bin.install "rc"
    test: |
      system "#{bin}/rc", "--help"
