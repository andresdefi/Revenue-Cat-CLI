name: Bug Report
description: Report a bug in the rc CLI
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Run `rc ...`
        2. See error
    validations:
      required: true

  - type: textarea
    id: version
    attributes:
      label: Version Info
      description: Paste the output of `rc version`
      render: shell
    validations:
      required: true

  - type: dropdown
    id: install
    attributes:
      label: Installation Method
      options:
        - Homebrew
        - go install
        - Binary download
        - Built from source
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15.2, Ubuntu 24.04, Windows 11, etc."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Output
      description: Paste the full error message. Try running with `--output json` for more detail.
      render: shell
