name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What use case does it address?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should it work? Include example commands if applicable.
      placeholder: |
        rc <new-command> --flag value

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What workarounds or alternatives have you tried?

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - New command
        - Enhancement to existing command
        - Output/formatting
        - Authentication
        - CI/tooling
        - Documentation
    validations:
      required: true
